{% extends "base.html" %}

{% block title %}Recognition - Face Attendance System{% endblock %}

{% block content %}
<div class="recognition-main">
    <div class="recognition-header">
        <div class="header-left">
            <h1>Face Recognition Attendance</h1>
            <div class="camera-selector">
                <select id="camera-select">
                    <option value="">Select Camera</option>
                </select>
                <button class="btn btn-secondary" id="toggle-camera">Start Camera</button>
            </div>
        </div>
        <div class="header-right">
            <button class="btn btn-primary" onclick="window.location.href='/users'">Register User</button>
            <button class="btn btn-secondary" onclick="window.location.href='/attendance'">View Logs</button>
            <button class="btn btn-secondary" onclick="window.location.href='/exports'">Export Report</button>
        </div>
    </div>

    <div class="recognition-content">
        <div class="video-main-container">
            <div class="video-wrapper">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>
                <div id="video-placeholder" class="video-placeholder">
                    <div class="placeholder-icon">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                    </div>
                    <p class="placeholder-title">Camera Ready</p>
                    <p class="placeholder-subtitle">Select a camera and click "Start Camera"</p>
                </div>
                <div id="recognition-overlay" class="recognition-overlay" style="display: none;">
                    <div class="overlay-content">
                        <div id="overlay-icon" class="overlay-icon"></div>
                        <div id="overlay-message" class="overlay-message"></div>
                        <div id="overlay-details" class="overlay-details"></div>
                    </div>
                </div>
                <div id="liveness-indicator" class="liveness-indicator" style="display: none;">
                    <span class="liveness-dot"></span>
                    <span class="liveness-text">Liveness Check</span>
                </div>
            </div>

            <div class="action-controls">
                <div class="action-type-selector">
                    <label class="action-radio">
                        <input type="radio" name="action" value="time_in" checked>
                        <span class="radio-button"></span>
                        <span class="radio-label">Time In</span>
                    </label>
                    <label class="action-radio">
                        <input type="radio" name="action" value="time_out">
                        <span class="radio-button"></span>
                        <span class="radio-label">Time Out</span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/recognition.js"></script>
{% endblock %}
